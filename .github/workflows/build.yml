name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Buildozer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/android-ndk
            ~/.buildozer/android/packages
          key: ${{ runner.os }}-buildozer-${{ hashFiles('**/buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            python3-pip build-essential git python3-dev \
            ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev \
            libsdl2-ttf-dev libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev zlib1g-dev \
            openjdk-17-jdk unzip autoconf automake libtool \
            pkg-config cmake libffi-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Install Android SDK Command-line Tools
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_DIR"
          
          # Download and install cmdline-tools
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip
          unzip -q commandlinetools-linux-10406996_latest.zip
          
          # Move to proper location
          mkdir -p "$SDK_DIR/cmdline-tools/latest"
          mv cmdline-tools/* "$SDK_DIR/cmdline-tools/latest/"
          
          # Verify installation
          if [ -f "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" ]; then
            echo "✅ sdkmanager installed successfully"
          else
            echo "❌ sdkmanager installation failed!"
            exit 1
          fi

      - name: Install Android Build-Tools (fix AIDL error)
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          export ANDROID_HOME="$SDK_DIR"
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          
          # Accept licenses
          yes | sdkmanager --licenses || true
          
          # Install build-tools
          sdkmanager "build-tools;33.0.2"
          
          # Verify AIDL installation
          if [ -f "$SDK_DIR/build-tools/33.0.2/aidl" ]; then
            echo "✅ AIDL found: $SDK_DIR/build-tools/33.0.2/aidl"
          else
            echo "❌ AIDL still missing!"
            ls -la "$SDK_DIR/build-tools/"
            exit 1
          fi

      - name: Build APK with Buildozer
        run: |
          cd .github
          
          # Check if spec file exists
          if [ ! -f buildozer.spec ]; then
            echo "❌ buildozer.spec not found!"
            buildozer init
          fi
          
          # Build APK
          buildozer -v android debug

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: my_web_app/bin/*.apk
          retention-days: 7
