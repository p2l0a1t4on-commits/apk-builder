name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Buildozer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/android-ndk
            ~/.buildozer/android/packages
          key: ${{ runner.os }}-buildozer-${{ hashFiles('**/buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            python3-pip build-essential git python3-dev \
            ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev \
            libsdl2-ttf-dev libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev zlib1g-dev \
            openjdk-17-jdk unzip autoconf automake libtool \
            pkg-config cmake libffi-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Setup Android SDK
        run: |
          yes | sdkmanager --licenses --sdk_root="$ANDROID_HOME"
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_DIR"
          
          # Download and install cmdline-tools
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip
          unzip -q commandlinetools-linux-10406996_latest.zip
          
          # Move to proper location
          mkdir -p "$SDK_DIR/cmdline-tools/latest"
          mv cmdline-tools/* "$SDK_DIR/cmdline-tools/latest/"
          
          # Verify installation
          if [ ! -f "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" ]; then
            echo "❌ sdkmanager installation failed!"
            ls -la "$SDK_DIR/cmdline-tools/latest/" || echo "Directory not found"
            exit 1
          fi
          
          echo "✅ sdkmanager installed successfully"
          
          # Export for next steps
          echo "ANDROID_HOME=$SDK_DIR" >> $GITHUB_ENV
          echo "$SDK_DIR/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Install Android Build Tools and Platforms
        run: |
          export ANDROID_HOME="$HOME/.buildozer/android/platform/android-sdk"
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          
          # Accept licenses non-interactively
          mkdir -p "$ANDROID_HOME/licenses"
          echo "8933bad161af4d29920f83372a6b6b2c1d1a3ad2d6926d7293e3995d6717f97b" > ...
          
          # Install platforms and build-tools
          sdkmanager --no_https --sdk_root="$ANDROID_HOME" "platforms;android-33"
          sdkmanager --no_https --sdk_root="$ANDROID_HOME" "build-tools;33.0.2"
          sdkmanager --no_https --sdk_root="$ANDROID_HOME" "platform-tools"
          
          # Verify installation
          if [ ! -f "$ANDROID_HOME/build-tools/33.0.2/aidl" ]; then
            echo "❌ AIDL installation failed!"
            ls -la "$ANDROID_HOME/build-tools/" || echo "build-tools not found"
            exit 1
          fi
          
          echo "✅ Android SDK build-tools and AIDL installed successfully"
          ls -la "$ANDROID_HOME/build-tools/33.0.2/aidl"

      - name: Verify buildozer.spec
        run: |
          if [ ! -f buildozer.spec ]; then
            echo "⚠️ buildozer.spec not found in root, creating..."
            buildozer init
          else
            echo "✅ buildozer.spec found"
          fi

      - name: Build APK with Buildozer
        run: |
          export ANDROID_HOME="$HOME/.buildozer/android/platform/android-sdk"
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          
          # Build from project root
          buildozer -v android debug

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
          retention-days: 7
